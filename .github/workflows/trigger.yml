name: OTA Package & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Firmware version (e.g. 1.2.0)"
        required: true

jobs:
  package-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: arch -arm64 python3 -m pip install requests minio paho-mqtt packaging fastapi httpx pytest

      - name: Run backend tests
        working-directory: backend
        run: arch -arm64 python3 -m pytest tests/test_*.py

      - name: Start Infra (mqtt, minio, backend)
        run: |
          docker compose up -d --remove-orphans
          echo "Waiting for services to be ready..."
          sleep 10

      - name: Package & Upload Firmware via API
        run: |
          python3 backend/"package_and _upload.py" \
            --version ${{ github.event.inputs.version }}

      - name: Confirm Deployment
        run: |
          echo " Firmware v${{ github.event.inputs.version }} uploaded to MinIO"
          echo " MQTT notification sent to topic: vehicle/ota"
